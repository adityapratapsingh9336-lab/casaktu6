<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Centre for Advanced Studies</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="login-body">
    <div id="cursor-glow"></div>
    <button class="theme-toggle" aria-label="Toggle Dark Mode" style="position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border-radius: 50%; width: 40px; height: 40px; color: var(--secondary);"><i class="ph ph-moon"></i></button>

    <div class="login-container glass-card">
        <div class="login-header">
            <i class="ph ph-buildings" style="font-size: 3rem; color: var(--primary); margin-bottom: 10px;"></i>
            <h2>CAS Portal</h2>
            <p style="color: var(--text-light); font-size: 0.95rem;">Login to access your dashboard</p>
        </div>

        <form action="dashboard.html">
            <div class="form-group">
                <label>Email Address</label>
                <div style="position: relative;">
                    <i class="ph ph-envelope-simple" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 1.2rem;"></i>
                    <input type="email" class="form-control" placeholder="student@cas.aktu.ac.in" style="padding-left: 45px;" required>
                </div>
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.85rem; color: var(--accent-light-blue);">Forgot Password?</a>
                </div>
                <div style="position: relative; margin-top: 8px;">
                    <i class="ph ph-lock-key" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 1.2rem;"></i>
                    <input type="password" class="form-control" placeholder="••••••••" style="padding-left: 45px;" required>
                </div>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="remember">
                <label for="remember" style="margin-bottom: 0; font-size: 0.9rem; font-weight: 400; cursor: pointer;">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary login-btn">Sign In</button>
        </form>
        
        <div style="text-align: center; margin-top: 30px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px;">
            <a href="index.html" style="color: var(--text-light); font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 5px;">
                <i class="ph ph-arrow-left"></i> Back to Website
            </a>
        </div>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
